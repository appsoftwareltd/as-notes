name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-vs-code-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vs-code-extension/package-lock.json
      - run: npm ci
        working-directory: vs-code-extension
      - run: npm test
        working-directory: vs-code-extension
