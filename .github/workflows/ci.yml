name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: common/package-lock.json
      - run: npm ci
        working-directory: common
      - run: npm test
        working-directory: common

  test-vs-code-extension:
    needs: test-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vs-code-extension/package-lock.json
      - run: npm ci
        working-directory: common
      - run: npm ci
        working-directory: vs-code-extension
      - run: npm test
        working-directory: vs-code-extension

  test-publish:
    needs: test-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: publish/package-lock.json
      - run: npm ci
        working-directory: common
      - run: npm ci
        working-directory: publish
      - run: npm test
        working-directory: publish

  build-docs:
    needs: test-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: publish/package-lock.json
      - run: npm ci
        working-directory: common
      - run: npm ci
        working-directory: publish
      - run: npm run build
        working-directory: publish
      - run: >
          npm run convert --
          --input ../docs-src/pages
          --output ../docs
          --stylesheet https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.css
          --stylesheet docs.css
          --asset ../docs-src/docs.css
        working-directory: publish
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          path: docs

  deploy-pages:
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
