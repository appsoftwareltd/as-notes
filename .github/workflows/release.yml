name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use GitHub's generate-notes API to produce a commit-based changelog
          GENERATED=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body')

          # Prepend the marketplace install link
          FULL_NOTES="Install via the Visual Studio Marketplace: https://marketplace.visualstudio.com/items?itemName=AppSoftwareLtd.as-notes

${GENERATED}"

          # Pass multi-line string safely via GITHUB_OUTPUT
          {
            echo "body<<EOF"
            echo "$FULL_NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.body }}"
